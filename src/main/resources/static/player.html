<!-- public/player.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер | Система управления потоковым вещанием</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/player.css">
</head>
<body>
<nav class="navbar" id="navbar">
    <div class="nav-container">
        <div class="logo">
            <span class="logo-dot"></span>
            <span>RadioManager</span>
        </div>
        <div class="nav-links" id="navLinks">
            <!-- Навигация будет динамически загружаться -->
        </div>
        <div class="user-info" id="userInfo">
            <!-- Информация о пользователе будет динамически загружаться -->
        </div>
    </div>
</nav>

<main class="main-content">
    <section class="player-section">
        <h2>🎵 Слушать эфир</h2>
        <div class="player-container">
            <div class="album-art">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
            </div>
            <div class="now-playing">
                <h3>Прямой эфир</h3>
                <p>Слушайте любимые треки онлайн</p>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="playPauseBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
            </div>
            <div class="volume-control">
                <span>🔊</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                <span id="volumeValue">70%</span>
            </div>
        </div>
    </section>

    <section class="feedback-section">
        <h2>💬 Обратная связь</h2>
        <form class="feedback-form" id="feedbackForm">
                <textarea
                        id="messageContent"
                        placeholder="Напишите сообщение ведущему..."
                        maxlength="500"
                ></textarea>
            <button type="submit">Отправить сообщение</button>
        </form>
    </section>
</main>

<!-- public/player.html - обновите audio элемент -->
<audio id="audioPlayer" crossorigin="anonymous">
    <source src="/audio/Coolio - Gangsta's Paradise (feat. L.V.).mp3" type="audio/mpeg">
</audio>

<script src="js/player.js"></script>
</body>
</html>
